name: Deploy Cognito Lambda Functions
run-name: Deploy Cognito Lambda Functions to ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/cognito-functions/**"
      - ".github/workflows/deploy_cognito_lambdas.yaml"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment'
        type: choice
        required: true
        default: dev
        options:
          - dev
          - uat
          - prod

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci --audit=false --fund=false

      - name: Build
        run: npm run build -w cognito-functions

      - name: Archive build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: cognito-functions
          path: apps/cognito-functions/out/cognito-functions.zip

  deploy:
    name: Deploy Cognito Lambda Functions
    runs-on: ubuntu-22.04
    needs: build

    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: cognito-functions
          path: ./target

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355 # v2
        with:
          role-to-assume: ${{ secrets.DEPLOY_IAM_ROLE }}
          aws-region: eu-south-1

      - name: Deploy cognito_custom_message
        run: |
          aws lambda update-function-code \
            --function-name cognito_custom_message \
            --zip-file fileb://target/cognito-functions.zip

      - name: Deploy cognito_post_confirmation
        run: |
          aws lambda update-function-code \
            --function-name cognito_post_confirmation \
            --zip-file fileb://target/cognito-functions.zip

      - name: Deploy cognito_define_auth_challenge
        run: |
          aws lambda update-function-code \
            --function-name cognito_define_auth_challenge \
            --zip-file fileb://target/cognito-functions.zip

      - name: Deploy cognito_create_auth_challenge
        run: |
          aws lambda update-function-code \
            --function-name cognito_create_auth_challenge \
            --zip-file fileb://target/cognito-functions.zip

      - name: Deploy cognito_verify_auth_challenge
        run: |
          aws lambda update-function-code \
            --function-name cognito_verify_auth_challenge \
            --zip-file fileb://target/cognito-functions.zip

      - name: Deploy cognito_pre_sign_up (dev only)
        if: ${{ (github.event.inputs.environment || 'dev') == 'dev' }}
        run: |
          aws lambda update-function-code \
            --function-name cognito_pre_sign_up \
            --zip-file fileb://target/cognito-functions.zip
