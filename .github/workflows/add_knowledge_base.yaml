name: Add knowledge base
run-name: Add knowledge base in ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment used as target'
        type: choice
        required: true
        default: dev
        options:
          - dev
          - uat
          - prod
      urls:
        description: 'URLs to parse (comma-separated)'
        required: true
        type: string
      vector_index_name:
        description: 'Parser Vector Index Name'
        required: true
        type: choice
        default: cittadino-index
        options:
          - cittadino-index
      depth:
        description: 'Maximum recursion depth for crawling links (optional)'
        required: false
        type: string
      parser_request_timeout_ms:
        description: 'Request timeout in milliseconds (optional, default: 20000)'
        required: false
        type: string
        default: '20000'
      valid_domain_variants:
        description: 'JSON array of allowed subdomain tokens (optional, e.g. ["sub1","sub2"])'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  run-parser:
    name: Run Parser Script (manual on ${{ inputs.environment }})
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run Parser for each URL
        uses: ./.github/actions/parser
        with:
          deploy_iam_role: ${{ secrets.DEPLOY_IAM_ROLE }}
          depth: ${{ inputs.depth }}
          environment: ${{ inputs.environment }}
          public_parser_request_timeout_ms: ${{ inputs.public_parser_request_timeout_ms }}
          urls: ${{ inputs.urls }}
          valid_domain_variants: ${{ inputs.valid_domain_variants }}
          vector_index_name: ${{ inputs.parser_vector_index_name }}

      - name: Run Extractor
        uses: ./.github/actions/extractor
        with:
          chb_aws_google_api_key: ${{ secrets.CHB_AWS_GOOGLE_API_KEY }}
          deploy_iam_role: ${{ secrets.DEPLOY_IAM_ROLE }}
          environment: ${{ inputs.environment }}
          urls: ${{ inputs.urls }}
          vector_index_name: ${{ inputs.vector_index_name }}
